name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18.x"
          cache: "pnpm"

      - name: Install pnpm globally
        run: |
          npm install -g pnpm
          pnpm --version
          which pnpm

      - name: Install dependencies
        run: npx pnpm install

      - name: Lint code
        run: npx pnpm run lint
